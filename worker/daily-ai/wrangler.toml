name = "flickd-daily-ai"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Reads serve from R2 at flickd.tangible.cloud/content/daily/*
# (Pages handles the rest of /content/*; this route preempts daily-only paths.)
routes = [
  { pattern = "flickd.tangible.cloud/daily/*", zone_name = "tangible.cloud" }
]

# Cron: 06:00 UTC every day.
[triggers]
crons = ["0 6 * * *"]

[[r2_buckets]]
binding = "FLICKD_DAILY"
bucket_name = "flickd-daily"

[vars]
TARGET_COUNT = "10"
# Secrets (set via `wrangler secret put`):
#   GEMINI_API_KEY
#   TMDB_API_KEY
