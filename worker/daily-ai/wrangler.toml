name = "flickto-daily-ai"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Serving is handled by the flickto-content worker (reads from the same R2
# bucket). This worker exists solely for the daily cron that generates the
# list and writes it to R2.

# Cron: 06:00 UTC every day.
[triggers]
crons = ["0 6 * * *"]

[[r2_buckets]]
binding = "CONTENT_BUCKET"
bucket_name = "flickto-content"

[vars]
TARGET_COUNT = "10"
# Secrets (set via `wrangler secret put`):
#   GEMINI_API_KEY
#   TMDB_API_KEY

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
