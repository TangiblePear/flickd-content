name = "flickd-share-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Bind to flickd.tangible.cloud/api/share* (JSON API) and /share/* (human
# landing page), plus the E2EE social channel (feed/opinions/inbox). All
# preempt the content Pages catch-all on the same host.
routes = [
  { pattern = "flickd.tangible.cloud/api/share", zone_name = "tangible.cloud" },
  { pattern = "flickd.tangible.cloud/api/share/*", zone_name = "tangible.cloud" },
  { pattern = "flickd.tangible.cloud/share/*", zone_name = "tangible.cloud" },
  { pattern = "flickd.tangible.cloud/api/feed/*", zone_name = "tangible.cloud" },
  { pattern = "flickd.tangible.cloud/api/opinions/*", zone_name = "tangible.cloud" },
  { pattern = "flickd.tangible.cloud/api/inbox/*", zone_name = "tangible.cloud" },
  { pattern = "flickd.tangible.cloud/api/friendcode", zone_name = "tangible.cloud" },
  { pattern = "flickd.tangible.cloud/api/friendcode/*", zone_name = "tangible.cloud" }
]

# Create with: wrangler kv namespace create FLICKD_SHARE
# then paste the id below.
[[kv_namespaces]]
binding = "FLICKD_SHARE"
id = "56252c82d64e4c04afa701609b664cbe"

[vars]
SHARE_TTL_SECONDS = "2592000"
RATE_LIMIT_PER_HOUR = "10"
MAX_ITEMS = "100"
