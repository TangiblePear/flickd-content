name = "flickto-share-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Bind to flickto.app/api/share* (JSON API) and /share/* (human
# landing page), plus the E2EE social channel (user profiles/opinions/access,
# inbox, friendcode), the portable-identity backup + live friends record, and
# the data-deletion endpoints. Legal pages (/privacy, /delete) are now served
# as static HTML by the flickto-content worker.
routes = [
  { pattern = "flickto.app/api/share", zone_name = "flickto.app" },
  { pattern = "flickto.app/api/share/*", zone_name = "flickto.app" },
  { pattern = "flickto.app/share/*", zone_name = "flickto.app" },
  { pattern = "flickto.app/api/user/*", zone_name = "flickto.app" },
  { pattern = "flickto.app/api/opinions/batch", zone_name = "flickto.app" },
  { pattern = "flickto.app/api/inbox/*", zone_name = "flickto.app" },
  { pattern = "flickto.app/api/friendcode", zone_name = "flickto.app" },
  { pattern = "flickto.app/api/friendcode/*", zone_name = "flickto.app" },
  { pattern = "flickto.app/api/social/*", zone_name = "flickto.app" },
  { pattern = "flickto.app/api/account/*", zone_name = "flickto.app" }
]


# Zero-knowledge object storage for the social channel. The relay only ever
# stores ciphertext + opaque tokens/hashes.
# Create with: wrangler r2 bucket create flickto-social
# Recommended lifecycle rules (dashboard): expire `share/` after 30 days and
# `rl/` after 1 day so abandoned share links and rate-limit counters self-clean.
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "flickto-social"

# Server-visible profile pictures + moderation reports/tombstones. Kept off the
# ciphertext bucket so it can carry different caching/lifecycle and so the
# flickto-web admin panel can bind THIS bucket alone for review/takedown.
# Create with: wrangler r2 bucket create flickto-profile-pics
# Recommended lifecycle rule (dashboard): expire `_reports/` after 90 days.
[[r2_buckets]]
binding = "PICS"
bucket_name = "flickto-profile-pics"

[vars]
SHARE_TTL_SECONDS = "2592000"
MAX_ITEMS = "100"
# Orphan-profile reaper: 365-day inactivity TTL, bounded per run. Triggered
# opportunistically from request traffic (no cron — account is at its 5-cron
# limit), at most once per REAP_INTERVAL_SECONDS.
PROFILE_TTL_SECONDS = "31536000"
GC_MAX_PREFIXES_PER_RUN = "500"
REAP_INTERVAL_SECONDS = "86400"
# Per-IP hourly cap for share-create; inbox-post allows 6x this.
RATE_LIMIT_PER_HOUR = "10"
# Image moderation. Set to "true" and add the VISION_API_KEY secret to enable the
# paid Cloud Vision SafeSearch scan (wrangler secret put VISION_API_KEY).
MODERATION_ENABLED = "true"
# Distinct reporters that auto-hide a picture pending admin review.
REPORT_AUTOHIDE = "3"
# Google account linking (Part 1). The OAuth **Web** client ID the ID token's `aud`
# must equal — fill in before deploying account linking. ACCOUNT_PEPPER is a SECRET
# (not here): `wrangler secret put ACCOUNT_PEPPER`. Until both are set, the account
# endpoints return 503 not_configured and the rest of the Worker is unaffected.
GOOGLE_WEB_CLIENT_ID = "REPLACE_WITH_OAUTH_WEB_CLIENT_ID.apps.googleusercontent.com"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
